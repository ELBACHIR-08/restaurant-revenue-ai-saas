<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dashboard — Restaurant Revenue AI</title>
  <style>
    :root {
      --ink:#191612;
      --muted:#776f64;
      --paper:#fffaf2;
      --card:#fffdf8;
      --line:#eadfce;
      --charcoal:#191714;
      --wood:#9b5e2e;
      --amber:#d99032;
      --saffron:#f6c15e;
      --sage:#60775f;
      --green:#12815f;
      --red:#c84a31;
      --shadow:0 22px 80px rgba(56,36,16,.14);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(246,193,94,.28), transparent 28%),
        radial-gradient(circle at 90% 20%, rgba(96,119,95,.18), transparent 30%),
        linear-gradient(135deg,#fff8ea 0%,#f7eddd 44%,#fffaf2 100%);
      min-height:100vh;
      overflow-x:hidden;
    }
    body:before{
      content:"";
      position:fixed;inset:0;z-index:-1;opacity:.35;pointer-events:none;
      background-image:
        linear-gradient(90deg,rgba(80,55,25,.06) 1px,transparent 1px),
        linear-gradient(0deg,rgba(80,55,25,.05) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:linear-gradient(to bottom, black, transparent 90%);
    }
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    .shell{max-width:1240px;margin:0 auto;padding:22px}
    .topbar{
      position:sticky;top:12px;z-index:50;
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:12px 14px;border:1px solid rgba(234,223,206,.75);border-radius:22px;
      background:rgba(255,250,242,.84);backdrop-filter:blur(18px);box-shadow:0 12px 44px rgba(70,45,20,.1)
    }
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.03em}
    .logo{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,#191714,#7a4c2a 55%,#d99032);display:grid;place-items:center;color:#fff;box-shadow:0 12px 24px rgba(90,54,16,.24)}
    .nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .nav button,.pill,.btn{border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:999px;padding:10px 14px;cursor:pointer;color:var(--ink);font-weight:700;transition:.18s ease}
    .nav button:hover,.btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(80,45,20,.11)}
    .btn.primary{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
    .btn.gold{background:linear-gradient(135deg,var(--amber),var(--saffron));border-color:rgba(153,91,37,.35);color:#2a1a0b}
    .btn.ghost{background:transparent}
    .btn.danger{background:#fff2ed;color:#a63821;border-color:#f1c6b8}
    
    .grid{display:grid;gap:16px}.grid.cols-3{grid-template-columns:repeat(3,1fr)}.grid.cols-4{grid-template-columns:repeat(4,1fr)}.grid.cols-2{grid-template-columns:repeat(2,1fr)}
    .section{padding:38px 0}.card{background:rgba(255,253,248,.82);border:1px solid rgba(234,223,206,.88);border-radius:var(--radius);box-shadow:0 18px 60px rgba(70,45,20,.08);padding:22px}.card.dark{background:#191714;color:#fff;border-color:#2c2720}.card.dark p{color:#cfc5b6}
    .metric{padding:18px;border-radius:22px;background:#fff;border:1px solid var(--line)}.metric .label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900}.metric .value{font-size:30px;font-weight:950;letter-spacing:-.05em;margin-top:4px}.metric .sub{font-size:13px;color:var(--muted);margin-top:4px}
    .pricing{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.plan{position:relative;overflow:hidden}.plan.featured{border-color:rgba(217,144,50,.55);box-shadow:0 26px 80px rgba(217,144,50,.18)}.price{font-size:34px;font-weight:950;letter-spacing:-.05em}.features{display:grid;gap:10px;margin:18px 0}.feature{display:flex;align-items:flex-start;gap:8px;color:var(--muted);font-size:14px}.check{color:var(--green);font-weight:900}
    
    .app{display:none;padding:28px 0}.app.active{display:block}.app-layout{display:grid;grid-template-columns:260px 1fr;gap:18px}.sidebar{position:sticky;top:22px;align-self:start;border-radius:30px;background:#191714;color:#fff;padding:14px;box-shadow:0 28px 80px rgba(20,15,10,.2)}.side-btn{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:#d8d0c5;padding:12px;border-radius:18px;text-align:left;cursor:pointer;font-weight:800}.side-btn.active,.side-btn:hover{background:rgba(255,255,255,.1);color:#fff}.content{min-width:0}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:16px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:800}.tab.active{background:#191714;color:#fff;border-color:#191714}.table{width:100%;border-collapse:separate;border-spacing:0 10px}.table th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 12px}.table td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 12px}.table td:first-child{border-left:1px solid var(--line);border-radius:16px 0 0 16px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 16px 16px 0}
    .form{display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-size:13px;color:var(--muted);font-weight:900}.input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px 14px;outline:none}.input:focus,select:focus,textarea:focus{border-color:var(--amber);box-shadow:0 0 0 4px rgba(217,144,50,.12)}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.status{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}.status.green{background:#e9f7ef;color:#0f6c4d}.status.gold{background:#fff2d5;color:#8a540c}.status.red{background:#fff0ea;color:#a63821}.status.gray{background:#efede8;color:#665d52}.modal{position:fixed;inset:0;background:rgba(25,22,18,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}.modal.active{display:flex}.modal-panel{background:#fffaf2;border:1px solid var(--line);border-radius:28px;max-width:760px;width:100%;max-height:88vh;overflow:auto;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.28)}.report-pre{white-space:pre-wrap;background:#171512;color:#fff;border-radius:22px;padding:18px;line-height:1.55;max-height:55vh;overflow:auto}.notice{border:1px solid rgba(217,144,50,.26);background:rgba(255,246,227,.76);border-radius:20px;padding:14px;color:#6f4a18}.mini{font-size:12px;color:var(--muted)}.hidden{display:none!important}.divider{height:1px;background:var(--line);margin:14px 0}.right{text-align:right}.empty{padding:24px;border:1px dashed var(--line);border-radius:22px;background:rgba(255,255,255,.55);color:var(--muted)}
    @media(max-width:900px){.app-layout,.grid.cols-4,.grid.cols-3,.grid.cols-2,.pricing{grid-template-columns:1fr}.sidebar{position:relative;top:auto}.form-row{grid-template-columns:1fr}.shell{padding:14px}}
  </style>
</head>
<body>
  <div class="shell" style="padding-top:12px">
    <main id="appView" class="app">
      <div class="app-layout">
        <aside class="sidebar">
          <div class="brand" style="margin:6px 8px 16px"><span class="logo">🍳</span><span>Espace restaurant</span></div>
          <button class="side-btn active" data-section="dashboard">📊 Dashboard</button>
          <button class="side-btn" data-section="products">🍽️ Produits</button>
          <button class="side-btn" data-section="promotions">🏷️ Promotions</button>
          <button class="side-btn" data-section="reservations">📅 Réservations</button>
          <button class="side-btn" data-section="orders">🛵 Commandes</button>
          <button class="side-btn" data-section="customers">👥 CRM</button>
          <button class="side-btn" data-section="subscription">💳 Abonnement</button>
          <button class="side-btn" data-section="settings">⚙️ Paramètres</button>
          <div class="divider" style="background:#3a352d"></div>
          <button class="side-btn" data-view="admin" id="appAdminBtn" style="display:none">🛡️ Super Admin</button>
          <button class="side-btn" data-view="home">← Site public</button>
          <button class="side-btn" data-logout style="color:#f1c6b8;margin-top:12px">🚪 Déconnexion</button>
        </aside>
        <section class="content" id="appContent"></section>
      </div>
    </main>

    <main id="adminView" class="app">
      <div class="app-layout">
        <aside class="sidebar">
          <div class="brand" style="margin:6px 8px 16px"><span class="logo">🛡️</span><span>Super Admin</span></div>
          <button class="side-btn active" data-admin-tab="global">Vue globale</button>
          <button class="side-btn" data-admin-tab="restaurants">Restaurants</button>
          <button class="side-btn" data-admin-tab="plans">Plans</button>
          <button class="side-btn" data-admin-tab="onboarding">Onboarding</button>
          <button class="side-btn" data-admin-tab="support">Support</button>
          <button class="side-btn" data-admin-tab="analytics">Analytics</button>
          <div class="divider" style="background:#3a352d"></div>
          <button class="side-btn" data-view="app">← Espace restaurant</button>
          <button class="side-btn" data-view="home">← Site public</button>
          <button class="side-btn" data-logout style="color:#f1c6b8;margin-top:12px">🚪 Déconnexion</button>
        </aside>
        <section class="content" id="adminContent"></section>
      </div>
    </main>
  </div>

  <div class="modal" id="modal"><div class="modal-panel" id="modalPanel"></div></div>

  <script>
    const STORAGE_KEY = 'rrai_saas_v2_state';
    const DEMO_RESTAURANT_ID = 'demo-restaurant';
    const fmt = new Intl.NumberFormat('fr-FR');
    const money = v => `${fmt.format(Number(v||0))} FCFA`;
    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    const state = {
      view: 'app', appSection: 'dashboard', adminTab: 'global',
      config: { configured:false, mode:'demo' },
      token: null, user: null, memberships: [], platformAdmin: false,
      restaurantId: DEMO_RESTAURANT_ID,
      selectedPlan: 'growth',
      products: [], promotions: [], adminSummary: null, adminRestaurants: [], adminSubscriptions: [],
      mode: 'demo'
    };

    function loadState(){
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        Object.assign(state, stored);
      } catch(e) {}
    }
    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        view: state.view, appSection: state.appSection, adminTab: state.adminTab,
        token: state.token, user: state.user, memberships: state.memberships,
        platformAdmin: state.platformAdmin, restaurantId: state.restaurantId,
        selectedPlan: state.selectedPlan, products: state.products,
        promotions: state.promotions, mode: state.mode
      }));
    }

    async function api(path, options={}){
      const headers = { 'Content-Type':'application/json', ...(options.headers||{}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      if (state.restaurantId) headers['x-restaurant-id'] = state.restaurantId;
      const res = await fetch(path, { ...options, headers });
      
      if (res.status === 401) {
        logout();
        return;
      }

      const contentType = res.headers.get('content-type') || '';
      let data;
      if (contentType.includes('application/json')) {
        data = await res.json();
      } else {
        const text = await res.text();
        const shortText = text.replace(/\s+/g, ' ').slice(0, 220);
        throw new Error(`Réponse API non JSON (${res.status}). Réponse: ${shortText}`);
      }
      if (!res.ok || data.ok === false) throw new Error(data.error || `API error ${res.status}`);
      return data;
    }

    function updateAdminVisibility() {
      const isPlatformAdmin = Boolean(state.platformAdmin);
      const appAdminBtn = $('#appAdminBtn');
      if (appAdminBtn) appAdminBtn.style.display = isPlatformAdmin ? 'flex' : 'none';
    }

    function show(view){
      if (view === 'admin' && !state.platformAdmin) {
        view = 'app';
      }
      state.view = view;
      saveState();
      ['app','admin'].forEach(v => {
        const el = $('#' + v + 'View');
        if(el) el.classList.toggle('active', v === view);
      });
      if(view === 'app') renderApp();
      if(view === 'admin') renderAdmin();
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    function logout() {
      state.token = null;
      state.user = null;
      state.memberships = [];
      state.platformAdmin = false;
      state.view = 'home';
      saveState();
      window.location.replace('/');
    }

    function stayRender(fn){ const y = window.scrollY; fn(); requestAnimationFrame(() => window.scrollTo(0,y)); }
    function setActiveButtons(){
      $$('.side-btn[data-section]').forEach(b => b.classList.toggle('active', b.dataset.section === state.appSection));
      $$('.side-btn[data-admin-tab]').forEach(b => b.classList.toggle('active', b.dataset.adminTab === state.adminTab));
    }
    
    function modal(html){ $('#modalPanel').innerHTML = html; $('#modal').classList.add('active'); }
    function closeModal(){ $('#modal').classList.remove('active'); $('#modalPanel').innerHTML = ''; }

    async function init(){
      loadState();
      if (!state.token) {
        state.view = 'home';
        saveState();
        window.location.replace('/');
        return;
      }
      
      try {
        state.config = await api('/api/config');
        state.mode = state.config.mode || 'demo';
      } catch(e) {
        state.config = { configured:false, mode:'demo' };
      }
      
      try {
        const me = await api('/api/auth-me');
        state.user = me.user;
        state.memberships = me.memberships || [];
        state.platformAdmin = me.platformAdmin;
        if(me.memberships && me.memberships[0]) state.restaurantId = me.memberships[0].restaurant_id;
      } catch(e) {}

      updateAdminVisibility();
      await loadBusinessData();
      bind();
      show(state.view === 'admin' ? 'admin' : 'app');
    }

    function bind(){
      document.addEventListener('click', async (e) => {
        const viewBtn = e.target.closest('[data-view]');
        if(viewBtn){
          e.preventDefault();
          if (viewBtn.dataset.view === 'home') {
            window.location.href = '/';
            return;
          }
          show(viewBtn.dataset.view);
          return;
        }
        
        const sec = e.target.closest('[data-section]');
        if(sec){
          e.preventDefault();
          stayRender(() => {
            state.appSection = sec.dataset.section;
            saveState();
            setActiveButtons();
            renderApp();
          });
          return;
        }
        
        const tab = e.target.closest('[data-admin-tab]');
        if(tab){
          e.preventDefault();
          stayRender(() => {
            state.adminTab = tab.dataset.adminTab;
            saveState();
            setActiveButtons();
            renderAdmin();
          });
          return;
        }
        
        if(e.target.closest('[data-close-modal]')) closeModal();
        const deleteProduct = e.target.closest('[data-delete-product]');
        if(deleteProduct){ await deleteProductById(deleteProduct.dataset.deleteProduct); return; }
        const deletePromo = e.target.closest('[data-delete-promo]');
        if(deletePromo){ await deletePromoById(deletePromo.dataset.deletePromo); return; }
        const reportBtn = e.target.closest('[data-generate-report]');
        if(reportBtn){ await generateReport(); return; }
        const copyReport = e.target.closest('[data-copy-report]');
        if(copyReport){ navigator.clipboard.writeText($('#reportText')?.textContent||''); copyReport.textContent = 'Copié'; return; }
        const downloadReport = e.target.closest('[data-download-report]');
        if(downloadReport){ downloadText('rapport-restaurant-revenue-ai.txt', $('#reportText')?.textContent||''); return; }
        
        if(e.target.closest('[data-logout]')){
          logout();
          return;
        }
      });
    }

    async function loadBusinessData(){
      try{ const p = await api('/api/products'); state.products = p.products||[]; }catch(e){ if(!state.products.length) state.products = demoProducts(); }
      try{ const pr = await api('/api/promotions'); state.promotions = pr.promotions||[]; }catch(e){ if(!state.promotions.length) state.promotions = demoPromotions(); }
      try{ const s = await api('/api/admin-summary'); state.adminSummary = s.summary; }catch(e){ state.adminSummary = { restaurants:18, trial_active:11, active_subscriptions:7, mrr_xof:260000, pending_onboarding:5, support_open:3, churn_risk:2 }; }
      saveState();
    }

    function demoProducts(){ return [
      { id:'demo-prod-1', name:'Chateaubriand 600g', category:'Viandes', price:45000, status:'available', delivery_enabled:false, takeaway_enabled:true, dine_in_enabled:true, tags:['signature','premium'], upsell_notes:'Saint-Julien Petit Caillou, dessert signature' },
      { id:'demo-prod-2', name:'Filet de daurade royale', category:'Poissons', price:16500, status:'available', delivery_enabled:true, takeaway_enabled:true, dine_in_enabled:true, tags:['léger','livrable'], upsell_notes:'Chablis, crème brûlée' },
      { id:'demo-prod-3', name:'Tiramisù déstructuré', category:'Desserts', price:7500, status:'available', delivery_enabled:true, takeaway_enabled:true, dine_in_enabled:true, tags:['dessert'], upsell_notes:'Espresso Martini' }
    ]; }
    function demoPromotions(){ return [
      { id:'demo-promo-1', name:'Menu déjeuner intelligent', channel:'site_qr', discount_type:'bundle', value:0, status:'active', rule_summary:'Lundi-vendredi 12h-15h' },
      { id:'demo-promo-2', name:'Anniversaire Premium', channel:'chatbot', discount_type:'gift', value:0, status:'active', rule_summary:'Dessert bougie + option champagne' }
    ]; }

    function dashboardMetrics(){
      const productValue = state.products.reduce((s,p)=>s+Number(p.price||0),0);
      const activePromos = state.promotions.filter(p=>p.status==='active').length;
      return { direct_revenue_xof: 980000 + productValue * 3 + activePromos * 45000, average_basket_xof: Math.max(22000, Math.round(productValue / Math.max(1,state.products.length) * 1.85)), reservations: 27 + activePromos, orders: 13 + state.products.filter(p=>p.delivery_enabled).length, upsell_rate: Math.min(89, 52 + activePromos*6 + state.products.filter(p=>p.upsell_notes).length*3), customers: 142 + activePromos*8 };
    }
    function renderApp(){
      setActiveButtons(); const m = dashboardMetrics();
      const content = $('#appContent');
      if(state.appSection==='dashboard') content.innerHTML = renderDashboard(m);
      if(state.appSection==='products') content.innerHTML = renderProducts();
      if(state.appSection==='promotions') content.innerHTML = renderPromotions();
      if(state.appSection==='reservations') content.innerHTML = renderReservations();
      if(state.appSection==='orders') content.innerHTML = renderOrders();
      if(state.appSection==='customers') content.innerHTML = renderCustomers();
      if(state.appSection==='subscription') content.innerHTML = renderSubscription();
      if(state.appSection==='settings') content.innerHTML = renderSettings();
      bindInlineForms();
    }
    function renderDashboard(m){ return `<div class="toolbar"><div><span class="eyebrow">${state.mode==='supabase'?'Supabase connecté':'Mode démo fallback'}</span><h2>Dashboard directeur</h2><p>Vue business alimentée par les données produits, promotions et commandes.</p></div><div><button class="btn gold" data-generate-report>Générer rapport</button></div></div><div class="grid cols-4"><div class="metric"><div class="label">CA direct estimé</div><div class="value">${money(m.direct_revenue_xof)}</div><div class="sub">Commandes + upsell</div></div><div class="metric"><div class="label">Panier moyen</div><div class="value">${money(m.average_basket_xof)}</div><div class="sub">Simulation dynamique</div></div><div class="metric"><div class="label">Réservations</div><div class="value">${m.reservations}</div><div class="sub">Acomptes activables</div></div><div class="metric"><div class="label">Upsell accepté</div><div class="value">${m.upsell_rate}%</div><div class="sub">IA + promos</div></div></div><div class="grid cols-2" style="margin-top:16px"><div class="card"><h3>Recommandations IA de la semaine</h3><div class="features"><div class="feature"><span class="check">✓</span>Mettre en avant les plats signature après 19h30.</div><div class="feature"><span class="check">✓</span>Pousser dessert + boisson maison sur livraison.</div><div class="feature"><span class="check">✓</span>Utiliser acompte wallet sur anniversaires et groupes.</div><div class="feature"><span class="check">✓</span>Activer une promo déjeuner en heures creuses.</div></div></div><div class="card dark"><h3>Score production</h3><p>Vercel + API + Supabase schema + endpoints CRUD produits/promos + super admin stable.</p><div class="divider" style="background:#3b342a"></div><div class="grid cols-2"><div><div class="value">${state.products.length}</div><p>produits</p></div><div><div class="value">${state.promotions.length}</div><p>promos</p></div></div></div></div>`; }
    function renderProducts(){ return `<div class="toolbar"><div><h2>Gestion produits</h2><p>Ajout, disponibilité, livraison, tags, upsell et persistance Supabase.</p></div><button class="btn gold" type="button" onclick="openProductModal()">Ajouter produit</button></div>${state.products.length?`<table class="table"><thead><tr><th>Produit</th><th>Catégorie</th><th>Prix</th><th>Canaux</th><th>Upsell</th><th></th></tr></thead><tbody>${state.products.map(p=>`<tr><td><strong>${esc(p.name)}</strong><br><span class="mini">${(p.tags||[]).join(', ')}</span></td><td>${esc(p.category||'Carte')}</td><td>${money(p.price)}</td><td>${p.dine_in_enabled?'Sur place ':''}${p.delivery_enabled?'Livraison ':''}${p.takeaway_enabled?'À emporter':''}</td><td>${esc(p.upsell_notes||'')}</td><td class="right"><button class="btn danger" data-delete-product="${p.id}">Supprimer</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Aucun produit. Ajoutez votre première entrée de menu.</div>'}`; }
    function renderPromotions(){ return `<div class="toolbar"><div><h2>Gestion promotions</h2><p>Créez des offres déclenchées par contexte : midi, anniversaire, livraison, groupe.</p></div><button class="btn gold" type="button" onclick="openPromoModal()">Créer promotion</button></div>${state.promotions.length?`<table class="table"><thead><tr><th>Promo</th><th>Canal</th><th>Règle</th><th>Statut</th><th></th></tr></thead><tbody>${state.promotions.map(p=>`<tr><td><strong>${esc(p.name)}</strong><br><span class="mini">${esc(p.description||'')}</span></td><td>${esc(p.channel||'chatbot')}</td><td>${esc(p.rule_summary||'')}</td><td><span class="status ${p.status==='active'?'green':'gray'}">${esc(p.status||'draft')}</span></td><td class="right"><button class="btn danger" data-delete-promo="${p.id}">Supprimer</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">Aucune promotion. Créez une offre ciblée.</div>'}`; }
    function renderReservations(){ return `<div class="toolbar"><div><h2>Réservations</h2><p>Tunnel conversationnel, acompte wallet, contact WhatsApp et réduction des no-shows.</p></div></div><div class="grid cols-3"><div class="metric"><div class="label">Aujourd’hui</div><div class="value">27</div><div class="sub">tables réservées</div></div><div class="metric"><div class="label">Acomptes</div><div class="value">120k</div><div class="sub">FCFA sécurisés</div></div><div class="metric"><div class="label">No-show</div><div class="value">-24%</div><div class="sub">grâce à la confirmation</div></div></div>`; }
    function renderOrders(){ return `<div class="toolbar"><div><h2>Commandes</h2><p>Livraison, à emporter, panier, frais estimés et paiement wallet-ready.</p></div></div><div class="grid cols-3"><div class="metric"><div class="label">Commandes directes</div><div class="value">13</div><div class="sub">hors plateformes tierces</div></div><div class="metric"><div class="label">Livrables</div><div class="value">${state.products.filter(p=>p.delivery_enabled).length}</div><div class="sub">produits activés</div></div><div class="metric"><div class="label">Délai moyen</div><div class="value">42 min</div><div class="sub">simulation opérationnelle</div></div></div>`; }
    function renderCustomers(){ return `<div class="toolbar"><div><h2>CRM clients</h2><p>Téléphone, email, consentement, historique et préférences.</p></div></div><div class="card"><h3>Segments prêts</h3><div class="grid cols-4"><div class="metric"><div class="label">Clients</div><div class="value">142</div><div class="sub">collectés</div></div><div class="metric"><div class="label">Anniversaire</div><div class="value">18</div><div class="sub">à relancer</div></div><div class="metric"><div class="label">Livraison</div><div class="value">46</div><div class="sub">commandes directes</div></div><div class="metric"><div class="label">Consentement</div><div class="value">62%</div><div class="sub">marketing opt-in</div></div></div></div>`; }
    function renderSubscription(){ return `<div class="toolbar"><div><h2>Abonnement</h2><p>Trial 30 jours puis conversion vers Starter, Growth ou Premium AI.</p></div></div><div class="grid cols-3"><div class="card"><h3>Starter</h3><div class="price">20 000</div><p>FCFA / mois</p></div><div class="card featured"><h3>Growth</h3><div class="price">30 000</div><p>FCFA / mois · recommandé</p></div><div class="card"><h3>Premium AI</h3><div class="price">50 000</div><p>FCFA / mois</p></div></div><div class="notice" style="margin-top:16px">PayDunya sera branché après validation du Core Supabase : webhook IPN, factures, activation/suspension automatique.</div>`; }
    function renderSettings(){ return `<div class="toolbar"><div><h2>Paramètres</h2><p>Rôles, canaux, horaires, zones de livraison et moyens de paiement.</p></div></div><div class="grid cols-2"><div class="card"><h3>Rôles</h3><p>Owner, Manager, Serveur, Cuisine, Marketing, Comptable.</p></div><div class="card"><h3>Wallets</h3><p>Wave, Orange Money, Free Money et PayDunya à connecter.</p></div></div>`; }

    function renderAdmin(){
      setActiveButtons(); const s = state.adminSummary||{}; const c = $('#adminContent');
      if(state.adminTab==='global') c.innerHTML = `<div class="toolbar"><div><span class="eyebrow">Super Admin</span><h2>Vue globale plateforme</h2><p>Les onglets changent uniquement le contenu.</p></div></div><div class="grid cols-4"><div class="metric"><div class="label">Restaurants</div><div class="value">${s.restaurants||18}</div><div class="sub">inscrits</div></div><div class="metric"><div class="label">Trials actifs</div><div class="value">${s.trial_active||11}</div><div class="sub">30 jours</div></div><div class="metric"><div class="label">Abonnements</div><div class="value">${s.active_subscriptions||7}</div><div class="sub">actifs</div></div><div class="metric"><div class="label">MRR</div><div class="value">${money(s.mrr_xof||260000)}</div><div class="sub">mensuel</div></div></div><div class="grid cols-2" style="margin-top:16px"><div class="card"><h3>Actions admin</h3><div class="features"><div class="feature"><span class="check">✓</span>Activer / suspendre restaurant</div><div class="feature"><span class="check">✓</span>Changer plan et statut abonnement</div><div class="feature"><span class="check">✓</span>Suivre support et onboarding</div></div></div><div class="card dark"><h3>Checklist prod</h3><p>Supabase Auth, RLS, variables Vercel, platform admin emails, PayDunya next.</p></div></div>`;
      if(state.adminTab==='restaurants') c.innerHTML = `<div class="toolbar"><div><h2>Restaurants</h2><p>Liste réelle via /api/admin-restaurants si Supabase est configuré.</p></div><button class="btn" onclick="loadAdminRestaurants()">Rafraîchir</button></div><div id="adminRestaurantsTable">${renderAdminRestaurantsTable()}</div>`;
      if(state.adminTab==='plans') c.innerHTML = `<div class="toolbar"><div><h2>Plans</h2><p>Starter, Growth, Premium AI et Enterprise.</p></div></div><div class="pricing"><div class="card"><h3>Starter</h3><div class="price">20k</div><p>Menu, QR, réservations simples.</p></div><div class="card featured"><h3>Growth</h3><div class="price">30k</div><p>Commandes, livraison, CRM, paiements.</p></div><div class="card"><h3>Premium AI</h3><div class="price">50k</div><p>Sommelier, assistant serveur, analytics.</p></div></div>`;
      if(state.adminTab==='onboarding') c.innerHTML = `<div class="toolbar"><div><h2>Onboarding</h2><p>Suivi des restaurants en période gratuite.</p></div></div><div class="grid cols-3"><div class="metric"><div class="label">À configurer</div><div class="value">5</div><div class="sub">menus à importer</div></div><div class="metric"><div class="label">Prêts à lancer</div><div class="value">4</div><div class="sub">QR + produits OK</div></div><div class="metric"><div class="label">À relancer</div><div class="value">2</div><div class="sub">trial J-5</div></div></div>`;
      if(state.adminTab==='support') c.innerHTML = `<div class="toolbar"><div><h2>Support</h2><p>Tickets, demandes d’intégration, incidents paiement et demandes restaurants.</p></div></div><div class="card"><table class="table"><tbody><tr><td><strong>La Fourchette</strong></td><td>Importer photos menu</td><td><span class="status gold">En cours</span></td></tr><tr><td><strong>Saly Beach Kitchen</strong></td><td>Activer livraison</td><td><span class="status green">Prêt</span></td></tr></tbody></table></div>`;
      if(state.adminTab==='analytics') c.innerHTML = `<div class="toolbar"><div><h2>Analytics plateforme</h2><p>MRR, activation, conversion trial, utilisation modules.</p></div></div><div class="grid cols-4"><div class="metric"><div class="label">Conversion trial</div><div class="value">38%</div><div class="sub">objectif 45%</div></div><div class="metric"><div class="label">ARPA</div><div class="value">37k</div><div class="sub">FCFA / mois</div></div><div class="metric"><div class="label">Modules actifs</div><div class="value">4.8</div><div class="sub">par restaurant</div></div><div class="metric"><div class="label">Churn risk</div><div class="value">${s.churn_risk||2}</div><div class="sub">à traiter</div></div></div>`;
    }
    function renderAdminRestaurantsTable(){ const rows = state.adminRestaurants.length ? state.adminRestaurants : [{ name:'La Fourchette Dakar', city:'Dakar', status:'trial', owner_email:'owner@example.com' },{ name:'Saly Beach Kitchen', city:'Saly', status:'active', owner_email:'manager@example.com' }]; return `<table class="table"><thead><tr><th>Restaurant</th><th>Ville</th><th>Owner</th><th>Statut</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${esc(r.name)}</strong></td><td>${esc(r.city||'')}</td><td>${esc(r.owner_email||'')}</td><td><span class="status ${r.status==='active'?'green':r.status==='trial'?'gold':'gray'}">${esc(r.status||'trial')}</span></td></tr>`).join('')}</tbody></table>`; }
    async function loadAdminRestaurants(){ try{ const data = await api('/api/admin-restaurants'); state.adminRestaurants = data.restaurants||[]; renderAdmin(); }catch(e){ alert(e.message); } }

    function bindInlineForms(){ }
    window.openProductModal = function(){ modal(`<h2>Ajouter produit</h2><p>Produit sauvegardé dans Supabase si configuré, sinon en local pour la démo.</p><form class="form" id="productForm"><div class="form-row"><div class="field"><label>Nom</label><input class="input" name="name" required value="Gambas flambées au Pastis"></div><div class="field"><label>Prix FCFA</label><input class="input" name="price" type="number" required value="22500"></div></div><div class="form-row"><div class="field"><label>Catégorie</label><input class="input" name="category" value="Poissons"></div><div class="field"><label>Tags</label><input class="input" name="tags" value="premium,livrable"></div></div><div class="field"><label>Notes upsell</label><input class="input" name="upsell_notes" value="Chablis, dessert signature"></div><div class="quick"><label><input type="checkbox" name="dine_in_enabled" checked> Sur place</label><label><input type="checkbox" name="delivery_enabled" checked> Livraison</label><label><input type="checkbox" name="takeaway_enabled" checked> À emporter</label></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button type="button" class="btn" data-close-modal>Annuler</button><button class="btn gold" type="submit">Sauvegarder</button></div></form>`); $('#productForm').addEventListener('submit', submitProduct); };
    async function submitProduct(e){ e.preventDefault(); const fd = new FormData(e.currentTarget); const body = Object.fromEntries(fd.entries()); body.dine_in_enabled = fd.has('dine_in_enabled'); body.delivery_enabled = fd.has('delivery_enabled'); body.takeaway_enabled = fd.has('takeaway_enabled'); body.price = Number(body.price); try{ const data = await api('/api/products',{method:'POST',body:JSON.stringify(body)}); state.products.unshift(data.product); saveState(); closeModal(); renderApp(); }catch(err){ alert(err.message); } }
    async function deleteProductById(id){ if(!confirm('Supprimer ce produit ?')) return; try{ await api('/api/products',{method:'DELETE',body:JSON.stringify({id})}); }catch(e){} state.products = state.products.filter(p => String(p.id) !== String(id)); saveState(); renderApp(); }
    window.openPromoModal = function(){ modal(`<h2>Créer promotion</h2><p>Définissez une règle commerciale simple, déclenchable dans le chatbot.</p><form class="form" id="promoForm"><div class="form-row"><div class="field"><label>Nom</label><input class="input" name="name" required value="Livraison offerte soir"></div><div class="field"><label>Canal</label><select name="channel"><option value="chatbot">Chatbot</option><option value="site_qr">QR / Site</option><option value="delivery">Livraison</option><option value="whatsapp">WhatsApp</option></select></div></div><div class="form-row"><div class="field"><label>Type</label><select name="discount_type"><option value="gift">Cadeau</option><option value="percentage">Pourcentage</option><option value="fixed">Montant fixe</option><option value="bundle">Bundle</option></select></div><div class="field"><label>Valeur</label><input class="input" name="value" type="number" value="0"></div></div><div class="field"><label>Règle</label><input class="input" name="rule_summary" value="Livraison offerte dès 30 000 FCFA entre 19h et 22h"></div><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button type="button" class="btn" data-close-modal>Annuler</button><button class="btn gold" type="submit">Créer</button></div></form>`); $('#promoForm').addEventListener('submit', submitPromo); };
    async function submitPromo(e){ e.preventDefault(); const fd = new FormData(e.currentTarget); const body = Object.fromEntries(fd.entries()); body.value = Number(body.value); body.status = 'active'; try{ const data = await api('/api/promotions',{method:'POST',body:JSON.stringify(body)}); state.promotions.unshift(data.promotion); saveState(); closeModal(); renderApp(); }catch(err){ alert(err.message); } }
    async function deletePromoById(id){ if(!confirm('Supprimer cette promotion ?')) return; try{ await api('/api/promotions',{method:'DELETE',body:JSON.stringify({id})}); }catch(e){} state.promotions = state.promotions.filter(p => String(p.id) !== String(id)); saveState(); renderApp(); }

    async function generateReport(){
      const metrics = dashboardMetrics();
      const payload = { restaurant_id:state.restaurantId, restaurantName:(state.memberships[0]&&state.memberships[0].restaurants&&state.memberships[0].restaurants.name)||'Restaurant pilote', metrics, products:state.products, promotions:state.promotions };
      try{ const data = await api('/api/reports-generate',{method:'POST',body:JSON.stringify(payload)}); openReport(data.report.content); }
      catch(err){ openReport(localReport(payload)); }
    }
    function localReport(payload){ const m = payload.metrics; return [`Rapport performance - ${payload.restaurantName}`,`Date: ${new Date().toLocaleString('fr-FR')}`,'',`CA direct estimé: ${money(m.direct_revenue_xof)}`,`Panier moyen: ${money(m.average_basket_xof)}`,`Réservations: ${m.reservations}`,`Commandes directes: ${m.orders}`,`Taux upsell: ${m.upsell_rate}%`,`Clients collectés: ${m.customers}`,'',`Produits configurés: ${payload.products.length}`,`Promotions actives: ${payload.promotions.filter(p=>p.status==='active').length}`,'','Recommandations:', '- Activer les upsells sur les produits signature.', '- Protéger les plats premium non adaptés à la livraison.', '- Relancer les clients anniversaires via WhatsApp.', '- Suivre conversion trial vers Growth/Premium AI.'].join('\n'); }
    function openReport(text){ modal(`<div class="toolbar"><div><h2>Rapport généré</h2><p>Basé sur les résultats affichés dans le dashboard.</p></div><button class="btn" data-close-modal>Fermer</button></div><pre class="report-pre" id="reportText">${esc(text)}</pre><div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn" data-copy-report>Copier</button><button class="btn gold" data-download-report>Télécharger</button></div>`); }
    function downloadText(filename, text){ const blob = new Blob([text],{type:'text/plain;charset=utf-8'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href); }
    function esc(v){ return String(v??'').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

    init();
  </script>
</body>
</html>
