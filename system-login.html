<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Login | Restaurant Revenue AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,300;4..144,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design-system.css">
  <style>
    body {
      background-color: var(--nuit);
      color: var(--ecume);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    .login-box {
      background: var(--nuit-2);
      padding: 48px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(232,220,196,0.1);
    }
    .login-box h1 {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
      color: var(--or-clair);
    }
    .login-box p {
      text-align: center;
      color: var(--faint);
      margin-bottom: 32px;
      font-size: 14px;
    }
    .field {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 13px;
      color: var(--faint);
      margin-bottom: 8px;
    }
    .field input {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(232,220,196,0.2);
      padding: 12px 16px;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus {
      border-color: var(--or);
    }
    .btn-sys {
      background: var(--or);
      color: var(--nuit);
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: opacity 0.2s;
    }
    .btn-sys:hover {
      opacity: 0.9;
    }
    .error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>Platform Admin</h1>
    <p>Accès restreint au propriétaire</p>
    <form id="sysLoginForm">
      <div class="field">
        <label>Email de l'administrateur</label>
        <input type="email" name="email" required placeholder="admin@restaurant-revenue.ai">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-sys">Authentification</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = 'rrai_saas_v2_state';
    
    async function api(path, options={}){
      const res = await fetch(path, { ...options, headers: { 'Content-Type': 'application/json' } });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Erreur réseau');
      return data;
    }

    document.getElementById('sysLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('loginError');
      const btn = e.target.querySelector('button');
      err.style.display = 'none';
      btn.textContent = 'Vérification...';
      btn.disabled = true;

      const fd = new FormData(e.target);
      const body = Object.fromEntries(fd.entries());

      try {
        const ld = await api('/api/login', { method: 'POST', body: JSON.stringify(body) });
        
        if (!ld.platformAdmin && ld.mode !== 'demo') {
          throw new Error("Accès refusé. Vous n'avez pas les privilèges Super Admin.");
        }

        const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        state.token = ld.session ? ld.session.access_token : 'demo-token';
        state.user = ld.session ? { id: ld.session.user.id, email: ld.session.user.email } : ld.user;
        state.memberships = ld.memberships || [];
        state.platformAdmin = true;
        state.mode = ld.mode || 'supabase';
        if (state.memberships[0]) state.restaurantId = state.memberships[0].restaurant_id;

        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        window.location.replace('/platform.html');
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.textContent = 'Authentification';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
